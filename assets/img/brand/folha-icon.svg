<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="50%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#A7F3D0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer coin ring -->
  <circle cx="60" cy="60" r="56" fill="url(#coinGrad)" filter="url(#shadow)"/>
  
  <!-- Inner coin border -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#A7F3D0" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- Inner coin face -->
  <circle cx="60" cy="60" r="46" fill="#065F46" fill-opacity="0.3"/>
  
  <!-- Leaf shape - stylized, elegant -->
  <path d="M60 28 C40 42, 32 62, 42 82 C46 74, 52 66, 60 60 C68 66, 74 74, 78 82 C88 62, 80 42, 60 28Z" 
        fill="url(#leafGrad)" fill-opacity="0.9"/>
  
  <!-- Leaf center vein -->
  <path d="M60 32 L60 78" stroke="#059669" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Leaf side veins -->
  <path d="M60 45 L48 54" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 45 L72 54" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 55 L45 66" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 55 L75 66" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 65 L50 74" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 65 L70 74" stroke="#059669" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- Subtle coin shine -->
  <ellipse cx="45" cy="40" rx="12" ry="18" fill="white" fill-opacity="0.08" transform="rotate(-20 45 40)"/>
</svg>