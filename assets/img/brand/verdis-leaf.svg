<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Corpo da folha — gota inclinada, mesma forma do welcome/impacto.svg
       (forestDeep #1F5F3A pra dar peso visual sobre o círculo branco). -->
  <path d="M26.5 5c-4 .3-8.5 1.5-11.5 4.5C12 12.5 10.5 16.5 11 21c.2 2 .8 4 1.7 6 4-.3 8.5-1.5 11.5-4.5C27 19.5 28 15 28 10.5 28 8.5 27.5 6.7 26.5 5z" fill="#1F5F3A"/>

  <!-- Nervura central — curva diagonal do talo até o ápice. -->
  <path d="M13 26c2.5-3 5.5-6 9-9" stroke="#FFFFFF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ranhuras laterais (3) saindo da nervura central pro lado externo
       da folha — espinha de peixe simplificada. -->
  <path d="M15.5 23l1.8 -2" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M17.7 21l1.8 -2.2" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M19.7 19l1.6 -1.7" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round"/>
</svg>
